<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Linhas</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --rosa:#c94070;--verde:#2e9e5b;--escuro:#2a1a0e;
  --amarelo:#f5c842;--fundo:#f5f0e8;
  --left-w:270px;--right-w:250px;--header-h:52px;
  --cell:80px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--fundo);color:var(--escuro);overflow:hidden;height:100vh;}

/* ── SETUP ────────────────────────────────── */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px;overflow-y:auto;}
#setup.hidden{display:none;}
.logo{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;line-height:1;}
.logo span{color:var(--rosa);}
.setup-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.setup-card h2{margin-bottom:16px;font-size:1.1rem;}

.player-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.player-row input{flex:1;padding:10px 12px;border:2px solid #ddd;border-radius:10px;font-size:.95rem;outline:none;}
.player-row input:focus{border-color:var(--rosa);}
.btn-del{background:#fee;color:#c00;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:.95rem;font-weight:700;}

.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.cfg-label{font-size:.8rem;font-weight:600;color:#666;margin-bottom:5px;}
select,input[type=text]{width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:10px;font-size:.9rem;background:#fff;outline:none;}
select:focus{border-color:var(--rosa);}

button{padding:11px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .12s;}
button:active{transform:scale(.96);}
button:disabled{opacity:.4;cursor:default;transform:none;}
.btn-rosa{background:var(--rosa);color:#fff;}
.btn-verde{background:var(--verde);color:#fff;}
.btn-escuro{background:var(--escuro);color:#fff;}
.btn-outline{background:transparent;border:2px solid var(--rosa);color:var(--rosa);}
.btn-full{width:100%;}
.btn-sm{padding:7px 14px;font-size:.82rem;}
.err{color:#c00;font-size:.82rem;font-weight:600;margin-top:6px;}

/* ── LINKS DOS JOGADORES ──────────────────── */
#links-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:20px;}
#links-screen.active{display:flex;}
.links-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:540px;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.player-link-item{background:#f9f9f9;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.link-name{font-weight:700;min-width:80px;}
.link-url{font-size:.78rem;color:#555;flex:1;word-break:break-all;font-family:monospace;}
.btn-copy{background:#eee;color:#333;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.75rem;font-weight:600;flex-shrink:0;}
.connected-dot{width:10px;height:10px;border-radius:50%;background:#ddd;flex-shrink:0;}
.connected-dot.on{background:var(--verde);}

/* ── JOGO: LAYOUT 3 COLUNAS ──────────────── */
#jogo{display:none;height:100vh;flex-direction:column;}
#jogo.active{display:flex;}

.game-header{
  height:var(--header-h);background:var(--escuro);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:12px;flex-shrink:0;
}
.game-header .titulo{font-weight:900;font-size:1rem;}
.pontos{font-weight:700;color:var(--amarelo);font-size:1rem;}
.timer{font-weight:900;color:var(--amarelo);font-variant-numeric:tabular-nums;}
.timer.urgente{color:#ff6b6b;animation:pisca .5s step-end infinite;}
@keyframes pisca{50%{opacity:.3;}}
.fase-badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;}
.fase-p{background:#e8f5ee;color:var(--verde);}
.fase-a{background:#fff3f6;color:var(--rosa);}

.game-body{
  flex:1;display:grid;overflow:hidden;
  grid-template-columns:var(--left-w) 1fr var(--right-w);
}

/* Painéis laterais */
.painel{padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.painel-left{border-right:1px solid #e0d8cc;}
.painel-right{border-left:1px solid #e0d8cc;}
.sec-titulo{font-size:.72rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.mini-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);}

/* Dar dica - botões de jogadores */
.dar-dica-list{display:flex;flex-direction:column;gap:6px;}
.dar-dica-btn{
  background:#fff;border:2px solid #e0d8cc;border-radius:10px;
  padding:10px 12px;cursor:pointer;text-align:left;width:100%;
  display:flex;align-items:center;gap:8px;
  transition:border-color .12s;
}
.dar-dica-btn:hover{border-color:var(--rosa);}
.dar-dica-btn .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;}
.dar-dica-btn .nome{font-weight:600;font-size:.88rem;flex:1;}
.dar-dica-btn .cartas{font-size:.72rem;color:#999;}

/* Formulário inline de dica (no painel esq) */
.clue-form{background:#fff3f6;border:2px solid var(--rosa);border-radius:10px;padding:12px;position:relative;}
.clue-form .form-titulo{font-size:.8rem;font-weight:700;color:var(--rosa);margin-bottom:8px;}
.clue-form select,.clue-form input{margin-bottom:8px;}
.clue-form .actions{display:flex;gap:6px;}
.btn-x{
  position:absolute;top:8px;right:8px;
  background:transparent;border:none;color:#999;
  font-size:1.1rem;cursor:pointer;line-height:1;padding:2px;
}
.btn-x:hover{color:var(--escuro);}

/* Dica ativa */
.dica-ativa-panel{background:var(--escuro);color:#fff;border-radius:10px;padding:14px;}
.dica-ativa-de{font-size:.75rem;color:#aaa;margin-bottom:4px;}
.dica-palavra{font-size:clamp(1.3rem,2.5vw,2rem);font-weight:900;color:var(--amarelo);word-break:break-word;}
.palpite-info{font-size:.8rem;color:#ccc;margin-top:8px;}
.palpite-coord{color:var(--amarelo);font-weight:700;}
.confirmar-row{display:flex;gap:6px;margin-top:8px;align-items:center;}

/* Players list */
.player-chip-list{display:flex;flex-direction:column;gap:5px;}
.player-chip{display:flex;align-items:center;gap:7px;font-size:.82rem;padding:5px 8px;border-radius:8px;background:#f9f9f9;}
.player-chip .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0;}
.player-chip .pn{font-weight:600;flex:1;}
.player-chip .pc{color:#999;font-size:.72rem;}
.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;}
.dot.on{background:var(--verde);}

/* Dicas usadas */
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{background:#eee;color:#777;padding:3px 8px;border-radius:20px;font-size:.72rem;text-decoration:line-through;}

/* ── CENTRO: GRID ─────────────────────────── */
.center-panel{
  display:flex;align-items:center;justify-content:center;
  padding:12px;overflow:hidden;
}
.grid-wrap{overflow:auto;}
.grid-table{border-collapse:separate;border-spacing:4px;}
.ax{
  background:var(--escuro);color:#fff;border-radius:7px;
  text-align:center;padding:6px 4px;
  width:var(--cell);height:var(--cell);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ax-l{font-size:1.1rem;font-weight:900;}
.ax-w{font-size:.62rem;opacity:.85;margin-top:3px;word-break:break-word;max-width:70px;line-height:1.2;}
.cell{
  width:var(--cell);height:var(--cell);
  border-radius:9px;border:2px solid #ddd;background:#fafafa;
  cursor:pointer;transition:all .12s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:3px;
}
.cell:hover:not(.colocada):not(.off){border-color:var(--rosa);background:#fff3f6;}
.cell.sel{border-color:var(--rosa);background:#fff3f6;box-shadow:0 0 0 3px rgba(201,64,112,.2);}
.cell.colocada{background:#e8f5ee;border-color:var(--verde);cursor:default;}
.cell.off{cursor:default;}
.cell-coord{font-size:.6rem;font-weight:700;color:#bbb;}
.cell-dica{font-size:.65rem;font-weight:700;color:var(--verde);word-break:break-word;margin-top:2px;}

/* ── OVERLAY: RESULTADO ───────────────────── */
#overlay-result{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
#overlay-result.vis{display:flex;}
.result-modal{
  border-radius:20px;padding:36px 28px;max-width:360px;width:100%;text-align:center;
  position:relative;
}
.result-modal.ok{background:#e8f5ee;border:3px solid var(--verde);}
.result-modal.err{background:#fde8e8;border:3px solid #e05252;}
.result-icon{font-size:3.5rem;line-height:1;margin-bottom:10px;}
.result-title{font-size:1.6rem;font-weight:900;margin-bottom:6px;}
.result-modal.ok .result-title{color:var(--verde);}
.result-modal.err .result-title{color:#e05252;}
.result-detail{color:#555;font-size:.9rem;margin-bottom:20px;}

/* ── OVERLAY: FIM ─────────────────────────── */
#overlay-fim{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
#overlay-fim.vis{display:flex;}
.fim-modal{background:#fff;border-radius:20px;padding:40px 28px;max-width:380px;width:100%;text-align:center;position:relative;}
.pontos-big{font-size:5rem;font-weight:900;color:var(--rosa);line-height:1;}
.rating{font-size:1.3rem;font-weight:700;margin-top:8px;}
.rating-guia{font-size:.8rem;color:#aaa;margin-top:6px;}

/* ── CORES ─────────────────────────────────── */
.av0{background:#c94070;}.av1{background:#2e9e5b;}.av2{background:#1e6fc4;}
.av3{background:#f5a623;}.av4{background:#9b59b6;}.av5{background:#16a085;}
.av6{background:#e74c3c;}.av7{background:#2980b9;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">Entre<span>Linhas</span></div>
  <div class="setup-card">
    <h2>Quem vai jogar?</h2>
    <div id="player-list"></div>
    <button class="btn-outline btn-sm" onclick="addPlayer()" id="btn-add" style="margin-bottom:16px">+ Adicionar jogador</button>
    <div class="config-grid">
      <div>
        <div class="cfg-label">Tamanho</div>
        <select id="gridSize">
          <option value="3">Expresso 3×3</option>
          <option value="4" selected>Clássico 4×4</option>
          <option value="5">Expert 5×5</option>
        </select>
      </div>
      <div>
        <div class="cfg-label">Cronômetro</div>
        <select id="crono">
          <option value="0">Sem limite</option>
          <option value="5">5 minutos</option>
          <option value="10">10 minutos</option>
        </select>
      </div>
    </div>
    <div id="setup-err" class="err"></div>
    <button class="btn-rosa btn-full" style="margin-top:4px" onclick="createRoom()">Gerar links dos jogadores →</button>
  </div>
</div>

<!-- LINKS -->
<div id="links-screen">
  <div class="links-card">
    <h2 style="margin-bottom:4px">Links dos Jogadores</h2>
    <p style="font-size:.85rem;color:#666;margin-bottom:16px">
      Cada jogador abre o link no celular. As cartas aparecem lá em tempo real — sem precisar olhar para o lado.
    </p>
    <div id="player-links"></div>
    <button class="btn-rosa btn-full" style="margin-top:16px" onclick="startGame()">Iniciar Partida →</button>
    <button class="btn-outline btn-full" style="margin-top:8px" onclick="backToSetup()">← Voltar</button>
  </div>
</div>

<!-- JOGO -->
<div id="jogo">
  <div class="game-header">
    <div>
      <div class="titulo">Entre Linhas</div>
      <div id="fase-display"></div>
    </div>
    <div class="pontos" id="disp-pontos">Pontos: 0</div>
    <div class="timer" id="disp-timer" style="display:none"></div>
    <div style="font-size:.75rem;color:#aaa" id="disp-pilha"></div>
  </div>

  <div class="game-body">
    <!-- ESQUERDA -->
    <div class="painel painel-left" id="painel-left">
      <!-- Conteúdo dinâmico: dar dica / dica ativa -->
    </div>

    <!-- CENTRO -->
    <div class="center-panel">
      <div class="grid-wrap">
        <table class="grid-table" id="grid-table"></table>
      </div>
    </div>

    <!-- DIREITA -->
    <div class="painel painel-right">
      <div>
        <div class="sec-titulo">Jogadores</div>
        <div class="player-chip-list" id="chips-jogadores"></div>
      </div>
      <div>
        <div class="sec-titulo">Dicas usadas</div>
        <div id="dicas-usadas" class="tags"><span style="color:#aaa;font-size:.8rem">Nenhuma ainda</span></div>
      </div>
      <div style="margin-top:auto;padding-top:8px;">
        <button class="btn-outline btn-sm btn-full" onclick="openFim()">Ver Pontuação</button>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY RESULTADO -->
<div id="overlay-result">
  <div class="result-modal" id="result-modal">
    <button class="btn-x" onclick="closeResult()">✕</button>
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-detail" id="result-detail"></div>
    <button class="btn-escuro btn-full" onclick="closeResult()">Continuar →</button>
  </div>
</div>

<!-- OVERLAY FIM -->
<div id="overlay-fim">
  <div class="fim-modal">
    <button class="btn-x" onclick="document.getElementById('overlay-fim').classList.remove('vis')">✕</button>
    <h2 style="margin-bottom:12px">Fim de Jogo!</h2>
    <div class="pontos-big" id="fim-pts">0</div>
    <div style="color:#888">cartas colocadas</div>
    <div class="rating" id="fim-rating"></div>
    <div class="rating-guia" id="fim-guia"></div>
    <button class="btn-rosa btn-full" style="margin-top:24px" onclick="restartGame()">Jogar Novamente</button>
    <button class="btn-outline btn-full" style="margin-top:8px" onclick="backToSetup()">Mudar Configurações</button>
  </div>
</div>

<script>
const socket = io();
let G = null; // game state
let roomPlayers = []; // from roomCreated
let activeClueForm = null; // playerIndex being filled

// ── SETUP ──────────────────────────────────
let playerNames = ['', ''];
function renderSetupList() {
  const el = document.getElementById('player-list');
  el.innerHTML = playerNames.map((n, i) => `
    <div class="player-row">
      <input type="text" placeholder="Jogador ${i+1}" value="${esc(n)}" maxlength="20"
             oninput="playerNames[${i}]=this.value">
      ${i >= 2 ? `<button class="btn-del" onclick="removePlayer(${i})">✕</button>` : ''}
    </div>
  `).join('');
  document.getElementById('btn-add').style.display = playerNames.length >= 8 ? 'none' : '';
}
function addPlayer() { if (playerNames.length < 8) { playerNames.push(''); renderSetupList(); } }
function removePlayer(i) { playerNames.splice(i, 1); renderSetupList(); }
renderSetupList();

function createRoom() {
  document.querySelectorAll('#player-list input').forEach((inp, i) => { playerNames[i] = inp.value.trim(); });
  const names = playerNames.filter(n => n);
  const err = document.getElementById('setup-err');
  if (names.length < 2) { err.textContent = 'Adicione pelo menos 2 jogadores.'; return; }
  err.textContent = '';
  const gridSize = parseInt(document.getElementById('gridSize').value);
  const cronoMin = parseInt(document.getElementById('crono').value);
  socket.emit('setupGame', { names, gridSize, cronoMin });
}

function backToSetup() {
  document.getElementById('links-screen').classList.remove('active');
  document.getElementById('jogo').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('overlay-fim').classList.remove('vis');
  G = null;
}

// ── LINKS ──────────────────────────────────
socket.on('roomCreated', ({ players }) => {
  roomPlayers = players;
  const el = document.getElementById('player-links');
  el.innerHTML = players.map((p, i) => `
    <div class="player-link-item">
      <div class="dot" id="dot-${i}"></div>
      <div class="link-name">${esc(p.name)}</div>
      <div class="link-url">${esc(p.url)}</div>
      <button class="btn-copy" onclick="copyLink('${esc(p.url)}', this)">Copiar</button>
    </div>
  `).join('');
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('links-screen').classList.add('active');
});

function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 1500);
  });
}

function startGame() {
  socket.emit('startGame');
  document.getElementById('links-screen').classList.remove('active');
  document.getElementById('jogo').classList.add('active');
  computeCellSize();
}

// ── GAME STATE ─────────────────────────────
socket.on('gameState', (state) => {
  G = state;
  renderGame();
  if (state.phase === 'ended') openFim();
  // Update connection dots on links screen
  if (state.players) {
    state.players.forEach((p, i) => {
      const dot = document.getElementById(`dot-${i}`);
      if (dot) dot.classList.toggle('on', p.connected);
    });
  }
});

function renderGame() {
  if (!G) return;

  // Header
  document.getElementById('disp-pontos').textContent = `Pontos: ${G.score}`;
  document.getElementById('disp-pilha').textContent = `Pilha: ${G.pileCount}`;

  const fase = document.getElementById('fase-display');
  fase.innerHTML = G.phase === 'thinking'
    ? '<span class="fase-badge fase-p">Pensando...</span>'
    : '<span class="fase-badge fase-a">Adivinhando!</span>';

  const timerEl = document.getElementById('disp-timer');
  if (G.timeLeft !== null && G.timeLeft !== undefined) {
    timerEl.style.display = '';
    const m = Math.floor(G.timeLeft / 60), s = G.timeLeft % 60;
    timerEl.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
    timerEl.className = 'timer' + (G.timeLeft <= 30 ? ' urgente' : '');
  } else timerEl.style.display = 'none';

  // Grid
  renderGrid();

  // Painel esquerdo
  renderLeft();

  // Painel direito
  renderRight();
}

function renderGrid() {
  const t = document.getElementById('grid-table');
  if (!G.letters || !G.letters.length) { t.innerHTML = ''; return; }

  let html = '<thead><tr><td></td>';
  G.numbers.forEach(n => {
    html += `<td><div class="ax"><div class="ax-l">${n}</div><div class="ax-w">${esc(G.cols[n])}</div></div></td>`;
  });
  html += '</tr></thead><tbody>';

  G.letters.forEach(l => {
    html += `<tr><td><div class="ax"><div class="ax-l">${l}</div><div class="ax-w">${esc(G.rows[l])}</div></div></td>`;
    G.numbers.forEach(n => {
      const coord = `${l}${n}`;
      const placed = G.placed[coord];
      const adivinhando = G.phase === 'guessing';
      const sel = G.groupGuess === coord;

      let cls = 'cell';
      if (placed) cls += ' colocada';
      else if (sel) cls += ' sel';
      if (!adivinhando || placed) cls += ' off';

      const click = adivinhando && !placed ? `selectGuess('${coord}')` : '';
      const inner = placed
        ? `<div class="cell-dica">✓ ${esc(placed.clue)}</div>`
        : `<div class="cell-coord">${coord}</div>`;

      html += `<td><div class="${cls}" onclick="${click}">${inner}</div></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  t.innerHTML = html;
}

function renderLeft() {
  const el = document.getElementById('painel-left');
  if (!G) { el.innerHTML = ''; return; }

  if (G.phase === 'guessing' && G.currentClue) {
    const p = G.currentClue;
    el.innerHTML = `
      <div>
        <div class="sec-titulo">Dica em jogo</div>
        <div class="dica-ativa-panel">
          <div class="dica-ativa-de">Dica de <strong>${esc(p.playerName)}</strong>:</div>
          <div class="dica-palavra">${esc(p.clue)}</div>
          <div class="palpite-info">
            Clique na tabela para selecionar.<br>
            Palpite: <span class="palpite-coord">${G.groupGuess || '—'}</span>
          </div>
          <div class="confirmar-row">
            <button class="btn-verde btn-sm" onclick="confirmGuess()" ${G.groupGuess ? '' : 'disabled'}>
              Confirmar ✓
            </button>
          </div>
        </div>
      </div>
    `;
    return;
  }

  // Thinking phase
  const playersWithCards = G.players.filter(p => p.cardCount > 0);
  let html = `<div><div class="sec-titulo">Quem vai dar dica?</div><div class="dar-dica-list">`;

  playersWithCards.forEach(p => {
    const avCls = `av${p.index % 8}`;
    html += `
      <button class="dar-dica-btn" onclick="openClueForm(${p.index})">
        <div class="av ${avCls}">${p.name[0].toUpperCase()}</div>
        <div class="nome">${esc(p.name)}</div>
        <div class="cartas">${p.cardCount} carta(s)</div>
      </button>
    `;
  });

  if (!playersWithCards.length) {
    html += `<span style="font-size:.85rem;color:#aaa">Nenhum jogador com cartas.</span>`;
  }

  html += `</div></div>`;

  // Formulário inline de dica
  if (activeClueForm !== null) {
    const p = G.players.find(pl => pl.index === activeClueForm);
    const name = p ? p.name : '';
    html += `
      <div class="clue-form" id="clue-form">
        <button class="btn-x" onclick="closeClueForm()">✕</button>
        <div class="form-titulo">Dica de ${esc(name)}</div>
        <div class="cfg-label" style="margin-bottom:4px">Carta a usar:</div>
        <select id="coord-select" style="margin-bottom:8px"></select>
        <div class="cfg-label" style="margin-bottom:4px">Palavra (uma só):</div>
        <input id="clue-input" type="text" placeholder="Sua dica..." maxlength="30"
               autocomplete="off" onkeydown="if(event.key==='Enter')sendClue()">
        <div id="clue-err" class="err"></div>
        <div class="actions" style="margin-top:8px">
          <button class="btn-rosa btn-sm" onclick="sendClue()">Revelar dica →</button>
        </div>
      </div>
    `;
  }

  el.innerHTML = html;

  // Populate card select if form open
  if (activeClueForm !== null) {
    // We need card data - but publicState only has cardCount, not coords
    // We store it in pendingCards
    const sel = document.getElementById('coord-select');
    if (sel && pendingCards[activeClueForm]) {
      pendingCards[activeClueForm].forEach(card => {
        const opt = document.createElement('option');
        opt.value = card.coord;
        opt.textContent = `${card.coord} — ${card.rowWord} × ${card.colWord}`;
        sel.appendChild(opt);
      });
    }
    setTimeout(() => document.getElementById('clue-input')?.focus(), 50);
  }
}

function renderRight() {
  // Players
  const chips = document.getElementById('chips-jogadores');
  if (!G || !G.players) return;
  chips.innerHTML = G.players.map(p => `
    <div class="player-chip">
      <div class="av ${`av${p.index % 8}`}">${p.name[0].toUpperCase()}</div>
      <div class="pn">${esc(p.name)}</div>
      <span class="pc">${p.cardCount}✉</span>
      <div class="dot ${p.connected ? 'on' : ''}"></div>
    </div>
  `).join('');

  // Used clues
  const uc = document.getElementById('dicas-usadas');
  if (G.usedClues && G.usedClues.length > 0) {
    uc.innerHTML = G.usedClues.map(c => `<span class="tag">${esc(c)}</span>`).join('');
  } else {
    uc.innerHTML = '<span style="color:#aaa;font-size:.8rem">Nenhuma ainda</span>';
  }
}

// ── CLUE FORM ──────────────────────────────
// Store card data for each player (received separately)
const pendingCards = {};

function openClueForm(playerIndex) {
  activeClueForm = playerIndex;
  renderLeft();
}
function closeClueForm() {
  activeClueForm = null;
  renderLeft();
}

socket.on('playerCards', ({ playerIndex, cards }) => {
  pendingCards[playerIndex] = cards;
  if (activeClueForm === playerIndex) renderLeft();
});

// When host clicks dar dica and player has no phone, request their cards
function openClueForm(playerIndex) {
  activeClueForm = playerIndex;
  socket.emit('requestPlayerCards', { playerIndex });
  renderLeft();
}

socket.on('playerCardsForHost', ({ playerIndex, cards }) => {
  pendingCards[playerIndex] = cards;
  renderLeft();
});

function sendClue() {
  const sel = document.getElementById('coord-select');
  const inp = document.getElementById('clue-input');
  const errEl = document.getElementById('clue-err');
  if (!sel || !inp) return;
  const coord = sel.value;
  const clue = inp.value.trim();
  if (!coord) { errEl.textContent = 'Selecione uma carta.'; return; }
  if (!clue) { errEl.textContent = 'Digite uma dica.'; return; }
  if (clue.includes(' ')) { errEl.textContent = 'Uma única palavra.'; return; }
  errEl.textContent = '';
  socket.emit('submitClue', { clue, coord, playerIndex: activeClueForm });
  activeClueForm = null;
}

socket.on('clueError', (msg) => {
  const el = document.getElementById('clue-err');
  if (el) el.textContent = msg;
});

// ── GUESS ──────────────────────────────────
function selectGuess(coord) {
  socket.emit('setGroupGuess', { coord });
}
function confirmGuess() {
  socket.emit('confirmGuess');
}

// ── RESULT ─────────────────────────────────
socket.on('gameState', (state) => {
  if (state.lastResult) showResult(state.lastResult);
});

function showResult(r) {
  const modal = document.getElementById('result-modal');
  modal.className = 'result-modal ' + (r.correct ? 'ok' : 'err');
  document.getElementById('result-icon').textContent = r.correct ? '🎉' : '😬';
  document.getElementById('result-title').textContent = r.correct ? 'Acertaram!' : 'Erraram!';
  document.getElementById('result-detail').textContent = r.correct
    ? `"${r.clue}" estava na posição ${r.coord}. +1 ponto!`
    : `Vocês disseram ${r.guess}, mas a carta era ${r.coord}. Carta descartada.`;
  document.getElementById('overlay-result').classList.add('vis');
}
function closeResult() {
  document.getElementById('overlay-result').classList.remove('vis');
}

// ── FIM ────────────────────────────────────
function openFim() {
  if (!G) return;
  const pts = G.score, size = G.gridSize;
  document.getElementById('fim-pts').textContent = pts;
  const ratings = {
    3:[{m:3,l:'Fracasso 😬'},{m:5,l:'Mediano 🤔'},{m:7,l:'Bom! 💪'},{m:99,l:'Espetacular! 🤯'}],
    4:[{m:7,l:'Fracasso 😬'},{m:11,l:'Mediano 🤔'},{m:14,l:'Bom! 💪'},{m:99,l:'Espetacular! 🤯'}],
    5:[{m:11,l:'Fracasso 😬'},{m:16,l:'Mediano 🤔'},{m:22,l:'Bom! 💪'},{m:99,l:'Espetacular! 🤯'}],
  };
  const guias = {3:'Espetacular:8+ | Bom:6-7 | Mediano:4-5',4:'Espetacular:15+ | Bom:12-14 | Mediano:8-11',5:'Espetacular:23+ | Bom:17-22 | Mediano:12-16'};
  const r = (ratings[size]||ratings[4]).find(x => pts <= x.m);
  document.getElementById('fim-rating').textContent = r ? r.l : '';
  document.getElementById('fim-guia').textContent = guias[size]||'';
  document.getElementById('overlay-fim').classList.add('vis');
}
function restartGame() {
  document.getElementById('overlay-fim').classList.remove('vis');
  socket.emit('startGame');
  document.getElementById('jogo').classList.add('active');
}

// ── CELL SIZE ──────────────────────────────
function computeCellSize() {
  const leftW = 270, rightW = 250, headerH = 52, pad = 24, axisW = 70, axisH = 70;
  const availW = window.innerWidth - leftW - rightW - pad * 2 - axisW;
  const availH = window.innerHeight - headerH - pad * 2 - axisH;
  const gridSize = G ? G.gridSize : 4;
  const cell = Math.floor(Math.min(availW / gridSize, availH / gridSize, 110));
  document.documentElement.style.setProperty('--cell', `${Math.max(cell, 52)}px`);
}
window.addEventListener('resize', computeCellSize);

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
