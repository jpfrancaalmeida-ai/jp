<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louvor — Primeira Igreja Batista em Urucânia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCINdLifPvAaPvbl3qLLV-bCPL2_Vpd0do",
    authDomain: "base-de-dados---louvor.firebaseapp.com",
    projectId: "base-de-dados---louvor",
    storageBucket: "base-de-dados---louvor.firebasestorage.app",
    messagingSenderId: "1043025889799",
    appId: "1:1043025889799:web:080417385d5ffbb8c2f8a2"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>
<style>
  :root{
    --ink:#121110;
    --ink-soft:#3a3733;
    --paper:#faf8f4;
    --paper-raised:#ffffff;
    --line:#dedad2;
    --line-strong:#b9b4a8;
    --muted:#76716a;
    --shadow-ink: rgba(18,17,16,0.08);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.serif{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .app{max-width:760px;margin:0 auto;padding:0 18px 90px;}

  /* ---------- TOPBAR ---------- */
  .topbar{
    padding:28px 18px 0;
    max-width:760px;margin:0 auto;
  }
  .brand-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .brand h1{font-size:26px;font-weight:600;line-height:1.15;margin:0;letter-spacing:-0.01em;}
  .brand .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--muted); margin:0 0 4px;
  }
  .admin-pill{
    font-size:11px; font-family:'JetBrains Mono',monospace;
    border:1px solid var(--ink); padding:6px 10px; border-radius:20px;
    white-space:nowrap; display:flex; align-items:center; gap:6px;
  }
  .admin-pill.on{background:var(--ink); color:var(--paper);}
  .admin-pill button{background:none;border:none;color:inherit;font:inherit;padding:0;text-decoration:underline;}

  /* ---------- TABS ---------- */
  .tabs{
    display:flex; gap:4px;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    display:flex; align-items:center; gap:7px;
    padding:12px 14px 13px;
    background:none; border:none;
    font-size:14px; font-weight:500; color:var(--muted);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
    white-space:nowrap;
  }
  .tab.active{color:var(--ink); border-bottom-color:var(--ink);}
  .tab svg{width:17px;height:17px;flex:none;}

  /* ---------- VIEW ---------- */
  .view{display:none; padding-top:22px; animation:rise 0.35s ease both;}
  .view.active{display:block;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  .view-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
  .view-head h2{font-size:20px; font-weight:600; margin:0;}
  .view-sub{font-size:13px; color:var(--muted); margin:2px 0 0;}

  /* ---------- BUTTONS ---------- */
  .btn{
    border:1px solid var(--ink); background:var(--paper-raised); color:var(--ink);
    padding:9px 15px; border-radius:9px; font-size:13.5px; font-weight:500;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:active{transform:scale(0.98);}
  .btn-dark{background:var(--ink); color:var(--paper-raised);}
  .btn-ghost{border-color:var(--line); background:none;}
  .btn-ghost:hover{border-color:var(--ink);}
  .btn-sm{padding:6px 10px; font-size:12.5px; border-radius:7px;}
  .btn-danger{border-color:#b53b3b; color:#b53b3b; background:none;}
  .icon-btn{
    width:30px;height:30px;border-radius:7px;border:1px solid var(--line);
    background:var(--paper-raised); display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{border-color:var(--ink);}
  .icon-btn svg{width:15px;height:15px;}

  /* ---------- SEARCH/FILTER ---------- */
  .toolbar{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .input, select.input{
    border:1px solid var(--line); border-radius:9px; padding:9px 12px;
    font-size:13.5px; background:var(--paper-raised); color:var(--ink);
    outline:none;
  }
  .input:focus{border-color:var(--ink);}
  .search-wrap{position:relative; flex:1; min-width:160px;}
  .search-wrap .input{width:100%; padding-left:34px;}
  .search-wrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px;height:15px; color:var(--muted);}

  /* ---------- SONG CARD ---------- */
  .song-list{display:flex; flex-direction:column; gap:10px;}
  .song-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; display:flex; align-items:center; gap:12px;
  }
  .song-main{flex:1; min-width:0;}
  .song-title{font-size:15.5px; font-weight:600; margin:0 0 2px; font-family:'Fraunces',serif;}
  .song-artist{font-size:12.5px; color:var(--muted); margin:0;}
  .song-tags{display:flex; gap:6px; margin-top:7px; flex-wrap:wrap;}
  .tag{
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em;
    background:var(--paper); border:1px solid var(--line); color:var(--ink-soft);
    padding:2px 8px; border-radius:20px;
  }
  .cat-toggle{display:flex; gap:6px; margin-bottom:16px;}
  .cat-toggle-btn{
    border:1px solid var(--line); background:var(--paper-raised); color:var(--muted);
    padding:7px 16px; border-radius:20px; font-size:13px; font-weight:500;
  }
  .cat-toggle-btn.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .tag-check{
    display:inline-flex; align-items:center; gap:6px; border:1.5px solid var(--line);
    border-radius:20px; padding:6px 12px 6px 8px; font-size:12.5px; cursor:pointer; margin:0 6px 6px 0;
    user-select:none;
  }
  .tag-check input{accent-color:var(--ink);}
  .tag-check .dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .tag-row{display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:11px; padding:9px 12px; margin-bottom:8px;}
  .tag-row .dot{width:16px;height:16px;border-radius:50%;flex:none; border:1px solid rgba(0,0,0,0.15);}
  .color-swatches{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .color-swatch{width:26px;height:26px;border-radius:50%; border:2px solid transparent; cursor:pointer;}
  .color-swatch.selected{border-color:var(--ink);}
  .tom-badge{
    font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;
    border:1.5px solid var(--ink); border-radius:7px; padding:5px 9px;
    min-width:38px; text-align:center; flex:none;
  }
  .song-actions{display:flex; gap:6px; flex:none;}
  .cifra-link{
    display:flex; align-items:center; gap:5px;
    font-size:12.5px; font-weight:500; text-decoration:none;
    border:1px solid var(--ink); border-radius:7px; padding:7px 10px;
  }
  .cifra-link svg{width:13px;height:13px;}
  .cifra-none{font-size:11.5px; color:var(--muted); font-style:italic;}

  /* ---------- VOZES ---------- */
  .voz-type-badge{
    font-size:10px; text-transform:uppercase; letter-spacing:0.07em;
    border:1px solid var(--line); border-radius:20px; padding:2px 8px;
    color:var(--ink-soft); flex:none;
  }
  .voz-row{
    display:flex; align-items:center; gap:10px; padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .voz-row:last-child{border-bottom:none;}
  .voz-audio{flex:1; height:36px; min-width:0;}
  .voz-audio::-webkit-media-controls-panel{background:var(--paper);}
  .voz-empty{text-align:center; padding:24px 0; color:var(--muted); font-size:13px;}
  .voz-add-section{border-top:1px solid var(--line); margin-top:10px; padding-top:14px;}
  .voz-file-label{
    display:flex; align-items:center; gap:8px;
    border:1.5px dashed var(--line-strong); border-radius:9px; padding:11px 14px;
    cursor:pointer; font-size:13px; color:var(--muted); transition:border-color 0.15s;
  }
  .voz-file-label:hover{border-color:var(--ink); color:var(--ink);}
  .voz-file-label svg{width:16px;height:16px;flex:none;}
  #voz_fileInput{display:none;}

  /* ---------- OUVIR / APOIO ---------- */
  .ouv-link-btn{
    display:flex; align-items:center; gap:10px;
    width:100%; padding:11px 14px; border-radius:10px;
    border:1px solid var(--line); background:var(--paper-raised);
    font-size:13.5px; font-weight:500; text-decoration:none; color:var(--ink);
    margin-bottom:8px;
  }
  .ouv-link-btn:last-child{margin-bottom:0;}
  .ouv-link-btn:hover{border-color:var(--ink);}
  .ouv-link-btn svg{width:18px;height:18px;flex:none;}
  .ouv-platform-icon{width:18px;height:18px;flex:none;border-radius:4px;}
  .apoio-row{
    display:flex; align-items:flex-start; gap:10px; padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .apoio-row:last-child{border-bottom:none;}
  .apoio-type-badge{
    font-size:10px; text-transform:uppercase; letter-spacing:0.07em;
    border:1px solid var(--line); border-radius:20px; padding:2px 8px;
    color:var(--ink-soft); flex:none; margin-top:2px;
  }
  .apoio-info{flex:1; min-width:0;}
  .apoio-nome{font-size:13px; font-weight:500; margin:0 0 4px;}
  .apoio-texto-body{font-size:12.5px; color:var(--ink-soft); white-space:pre-wrap; background:var(--paper); border:1px solid var(--line); border-radius:7px; padding:8px 10px; margin:4px 0 0;}
  #apoio_fileInput{display:none;}

  /* ---------- EMPTY STATE ---------- */
  .empty{
    text-align:center; padding:48px 20px; border:1px dashed var(--line-strong); border-radius:var(--radius);
    color:var(--muted);
  }
  .empty svg{width:30px;height:30px; margin-bottom:10px; opacity:0.6;}
  .empty p{margin:4px 0; font-size:13.5px;}
  .empty .empty-title{font-family:'Fraunces',serif; font-size:16px; color:var(--ink); font-weight:600;}

  /* ---------- SETLIST (MURAL) ---------- */
  .setlist-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:18px;
    overflow:hidden; margin-bottom:18px;
  }
  .setlist-header{
    background:var(--ink); color:var(--paper); padding:22px 22px 18px; position:relative;
  }
  .setlist-header .eyebrow{font-size:11px; letter-spacing:0.14em; text-transform:uppercase; opacity:0.7; margin:0 0 6px;}
  .setlist-header h3{font-size:23px; margin:0; font-weight:600; text-transform:capitalize;}
  .setlist-divider{
    height:0; border-top:2px dashed var(--line-strong); margin:0 22px;
  }
  .setlist-body{padding:16px 22px 20px;}
  .setlist-item{
    display:flex; align-items:flex-start; gap:14px; padding:13px 0;
    border-bottom:1px solid var(--line);
  }
  .setlist-item:last-child{border-bottom:none;}
  .setlist-num{
    font-family:'Fraunces',serif; font-weight:700; font-size:18px; color:var(--line-strong);
    width:24px; flex:none; padding-top:1px;
  }
  .setlist-info{flex:1; min-width:0;}
  .setlist-moment{font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin:0 0 2px;}
  .setlist-song{font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin:0;}
  .setlist-artist{font-size:12px; color:var(--muted); margin:2px 0 0;}
  .setlist-stamp{
    transform:rotate(-3deg); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    border:1.5px solid var(--ink); border-radius:6px; padding:4px 8px; flex:none;
  }
  .setlist-reorder{display:flex; flex-direction:column; gap:3px; flex:none;}

  /* ---------- AGENDA ---------- */
  .agenda-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:12px;
  }
  .agenda-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;}
  .agenda-date{
    font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; text-transform:capitalize; margin:0;
  }
  .agenda-time{font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin:2px 0 0;}
  .agenda-desc{font-size:13px; color:var(--ink-soft); margin:0 0 10px;}
  .team-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .team-chip{
    display:flex; align-items:center; gap:7px;
    border:1px solid var(--line); border-radius:20px; padding:5px 11px 5px 5px; font-size:12.5px;
  }
  .team-avatar{
    width:20px; height:20px; border-radius:50%; background:var(--ink); color:var(--paper);
    display:flex; align-items:center; justify-content:center; font-size:9.5px; font-weight:700; flex:none;
  }
  .team-role{color:var(--muted); font-size:11px;}

  /* ---------- ADMIN BANNER ---------- */
  .admin-banner{
    background:var(--ink); color:var(--paper); border-radius:11px; padding:10px 14px;
    display:flex; align-items:center; gap:8px; font-size:12.5px; margin-bottom:16px;
  }
  .admin-banner svg{width:14px;height:14px; flex:none;}

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(18,17,16,0.5); backdrop-filter:blur(2px);
    display:none; align-items:flex-end; justify-content:center; z-index:50; padding:0;
  }
  .overlay.show{display:flex;}
  @media (min-width:640px){
    .overlay{align-items:center; padding:20px;}
  }
  .modal{
    background:var(--paper); width:100%; max-width:480px; border-radius:20px 20px 0 0;
    padding:22px 20px 28px; max-height:88vh; overflow-y:auto;
    animation:slideUp 0.28s ease both;
  }
  @media (min-width:640px){ .modal{border-radius:18px; padding:26px;} }
  @keyframes slideUp{from{transform:translateY(24px); opacity:0;} to{transform:none; opacity:1;}}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .modal-head h3{font-size:18px; margin:0;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;}
  .field .input, .field select, .field textarea{width:100%; padding:10px 12px;}
  .field textarea{resize:vertical; min-height:60px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex; gap:8px; margin-top:18px;}
  .modal-actions .btn{flex:1; justify-content:center;}
  .error-msg{font-size:12.5px; color:#b53b3b; margin:6px 0 0;}
  .hint{font-size:11.5px; color:var(--muted); margin:4px 0 0;}

  .repeater{border:1px solid var(--line); border-radius:11px; padding:10px; margin-bottom:10px;}
  .repeater-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .repeater-row:last-child{margin-bottom:0;}
  .repeater-row .input{flex:1;}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(40px);
    background:var(--ink); color:var(--paper); padding:11px 18px; border-radius:30px;
    font-size:13px; opacity:0; transition:all 0.3s ease; z-index:60; pointer-events:none;
    white-space:nowrap; max-width:90vw; text-overflow:ellipsis; overflow:hidden;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- RESPONSIVO MOBILE ---------- */
  @media (max-width: 520px){
    .topbar{ padding:16px 12px 0; }
    .brand h1{ font-size:18px; }
    .app{ padding:0 10px 80px; }
    .song-card{ flex-wrap:wrap; gap:8px; padding:12px; }
    .song-actions{
      width:100%; display:grid;
      grid-template-columns: repeat(auto-fill, minmax(72px,1fr));
      gap:6px;
    }
    .cifra-link{ font-size:11px; padding:6px 7px; justify-content:center; }
    .icon-btn{ width:34px; height:34px; }
    .field-row{ flex-direction:column; gap:0; }
    .modal{ padding:18px 14px 24px; }
    .modal-actions{ flex-direction:column; }
    .modal-actions .btn{ width:100%; justify-content:center; }
    .btn{ font-size:13px; }
    .tab{ padding:10px 10px 11px; font-size:13px; gap:5px; }
    .tab svg{ width:15px; height:15px; }
    .setlist-header{ padding:16px 14px 12px; }
    .setlist-body{ padding:10px 14px 16px; }
    .agenda-card{ padding:12px; }
    .team-grid{ gap:6px; }
    .ouv-link-btn{ padding:10px 12px; font-size:13px; }
  }
  @media (max-width: 360px){
    .brand h1{ font-size:15px; }
    .admin-pill{ font-size:10px; padding:5px 8px; }
  }
  @media (hover: none) and (pointer: coarse){
    .btn:active{ transform:scale(0.96); }
    .tab{ min-height:44px; }
    .icon-btn{ min-width:40px; min-height:40px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-row">
    <div class="brand">
      <p class="eyebrow">Ministério de louvor</p>
      <h1>Primeira Igreja Batista<br>em Urucânia</h1>
    </div>
    <div id="adminPillWrap"></div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</div>

<div class="app">
  <div id="adminBannerWrap"></div>

  <section class="view" id="view-catalogo">
    <div class="view-head">
      <div>
        <h2>Catálogo</h2>
        <p class="view-sub" id="catalogCount"></p>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" id="btnManageTags" style="display:none;" onclick="openTagManager()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="m20.59 13.41-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/><circle cx="7" cy="7" r="1"/></svg>
          Tags
        </button>
        <button class="btn btn-dark" id="btnAddSong" style="display:none;" onclick="openSongModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M12 5v14M5 12h14"/></svg>
          Nova música
        </button>
      </div>
    </div>
    <div class="cat-toggle" id="catToggle">
      <button class="cat-toggle-btn active" data-cat="musica" onclick="switchCategory('musica')">Músicas</button>
      <button class="cat-toggle-btn" data-cat="hino" onclick="switchCategory('hino')">Hinos</button>
    </div>
    <div id="importBar" style="display:none;"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="input" id="searchInput" placeholder="Buscar música ou artista...">
      </div>
      <select class="input" id="filterTom"><option value="">Todos os tons</option></select>
    </div>
    <div class="song-list" id="songList"></div>
  </section>

  <section class="view" id="view-mural">
    <div class="view-head">
      <div>
        <h2>Mural de domingo</h2>
        <p class="view-sub">Repertório escolhido para o próximo culto</p>
      </div>
      <button class="btn btn-dark" id="btnEditMural" style="display:none;" onclick="openMuralModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Editar mural
      </button>
    </div>
    <div id="muralWrap"></div>
  </section>

  <section class="view" id="view-agenda">
    <div class="view-head">
      <div>
        <h2>Agenda</h2>
        <p class="view-sub">Próximas datas e escalas do louvor</p>
      </div>
      <button class="btn btn-dark" id="btnAddEvent" style="display:none;" onclick="openEventModal()">

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

async function loadKey(key, fallback){
  try{
    const doc = await db.collection('store').doc(key).get();
    return doc.exists ? JSON.parse(doc.data().value) : fallback;
  }catch(e){ console.warn('loadKey', key, e); return fallback; }
}
async function saveKey(key, value){
  try{
    await db.collection('store').doc(key).set({ value: JSON.stringify(value) });
    return true;
  }catch(e){ showToast('Não foi possível salvar agora. Tente de novo.'); return null; }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2400);
}

function fmtDateLong(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
}
function fmtDateShort(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function fmtTime(t){
  if(!t) return '';
  const [h,m] = t.split(':');
  return `${h}h${m && m!=='00' ? m : ''}`;
}
function nextSundayISO(){
  const d = new Date();
  const diff = (7 - d.getDay()) % 7;
  d.setDate(d.getDate() + (diff===0?0:diff));
  return d.toISOString().slice(0,10);
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
}
function youtubeSearchUrl(title, artist){
  const q = [title, artist, 'cifra'].filter(Boolean).join(' ');
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- TABS / NAV ---------------- */
function renderTabs(){
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = TABS.map(t=>`
    <button class="tab" data-tab="${t.id}" onclick="switchTab('${t.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${t.icon}</svg>
      ${t.label}
    </button>`).join('');
}
function switchTab(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+id));
}

function songKey(s){ return (s.title+'|'+(s.artist||'')).toLowerCase().trim(); }
function pendingImportBatch(){
  const existing = new Set(state.songs.map(songKey));
  const all = DRIVE_IMPORT_BATCH_1.concat(DRIVE_IMPORT_BATCH_2).concat(DRIVE_IMPORT_BATCH_3_HINOS);
  return all.filter(s => !existing.has(songKey(s)));
}
function renderImportBar(){
  const wrap = document.getElementById('importBar');
  if(!state.isAdmin){ wrap.style.display='none'; return; }
  const pending = pendingImportBatch();
  if(pending.length === 0){ wrap.style.display='none'; return; }
  const nMusicas = pending.filter(s=>(s.category||'musica')==='musica').length;
  const nHinos = pending.filter(s=>s.category==='hino').length;
  const parts = [];
  if(nMusicas) parts.push(`${nMusicas} música${nMusicas>1?'s':''}`);
  if(nHinos) parts.push(`${nHinos} hino${nHinos>1?'s':''}`);
  wrap.style.display='block';
  wrap.innerHTML = `<div class="admin-banner" style="background:var(--paper-raised); color:var(--ink); border:1.5px dashed var(--ink); margin-bottom:16px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    <span style="flex:1;">${parts.join(' e ')} importados do Drive, prontos pra entrar no catálogo.</span>
    <button class="btn btn-sm btn-dark" onclick="importDriveBatch()">Importar agora</button>
  </div>`;
}
async function importDriveBatch(silent=false){
  const pending = pendingImportBatch();
  if(pending.length === 0) return;
  pending.forEach(s => state.songs.push({id:uid(), title:s.title, artist:s.artist||'', tom:s.tom||'', tags:[], chordLink:s.chordLink||'', category:s.category||'musica'}));
  await saveKey('songs__v1', state.songs);
  renderCatalog();
  renderImportBar();
  if(!silent) showToast(`${pending.length} item(ns) importado(s) com sucesso.`);
}

function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if(u === 'lider' && p === '1234'){
    state.isAdmin = true;
    document.getElementById('loginError').style.display='none';
    renderAdminUI(); renderCatalog(); renderMural(); renderAgenda();
    showToast('Bem-vindo(a) ao modo líder.');
    switchTab('catalogo');
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
function doLogout(){
  state.isAdmin = false;
  renderAdminUI(); renderCatalog(); renderMural(); renderAgenda();
  showToast('Você saiu do modo líder.');
}

}

/* ================= CATÁLOGO ================= */
function switchCategory(cat){
  state.catFilter = cat;
  document.querySelectorAll('.cat-toggle-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===cat));
  renderCatalog();
}

function renderTomFilterOptions(songsInCategory){
  const sel = document.getElementById('filterTom');
  const currentVal = sel.value;
  const toms = [...new Set(songsInCategory.map(s=>s.tom).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todos os tons</option>' + toms.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  if(toms.includes(currentVal)) sel.value = currentVal;
}

function tagDef(id){ return state.tagDefs.find(t=>t.id===id); }

function renderCatalog(){
  const byCategory = state.songs.filter(s=>(s.category||'musica') === state.catFilter);
  renderTomFilterOptions(byCategory);
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const tomFilter = document.getElementById('filterTom').value;
  const filtered = byCategory.filter(s=>{
    const matchQ = !q || s.title.toLowerCase().includes(q) || (s.artist||'').toLowerCase().includes(q);
    const matchTom = !tomFilter || s.tom === tomFilter;
    return matchQ && matchTom;
  }).sort((a,b)=>a.title.localeCompare(b.title,'pt-BR'));

  const catLabel = state.catFilter === 'hino' ? 'hino' : 'música';
  document.getElementById('catalogCount').textContent = byCategory.length
    ? `${byCategory.length} ${catLabel}${byCategory.length>1?'s':''} no catálogo`
    : '';

  const list = document.getElementById('songList');
  if(byCategory.length === 0){
    list.innerHTML = emptyState(
      '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>',
      state.catFilter === 'hino' ? 'Nenhum hino cadastrado' : 'O catálogo está vazio',
      state.isAdmin ? 'Clique em "Nova música" para começar a adicionar o repertório.' : 'Peça para um líder de louvor adicionar o repertório.'
    );
    return;
  }
  if(filtered.length === 0){
    list.innerHTML = emptyState('<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>', 'Nada encontrado', 'Tente outra busca ou limpe o filtro de tom.');
    return;
  }

  list.innerHTML = filtered.map(s=>`
    <div class="song-card">
      <div class="tom-badge">${escapeHtml(s.tom || '—')}</div>
      <div class="song-main">
        <p class="song-title">${escapeHtml(s.title)}</p>
        ${s.artist ? `<p class="song-artist">${escapeHtml(s.artist)}</p>`:''}
        ${s.tags && s.tags.length ? `<div class="song-tags">${s.tags.map(id=>{const td=tagDef(id); return td ? `<span class="tag" style="border-color:${td.color}; color:${td.color};">${escapeHtml(td.name)}</span>` : '';}).join('')}</div>`:''}
      </div>
      <div class="song-actions">
        ${s.chordLink
          ? `<a class="cifra-link" href="${escapeHtml(s.chordLink)}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3h7v7M21 3 10 14"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
              Cifra
            </a>`
          : `<span class="cifra-none">sem cifra</span>`}
        <button class="cifra-link" onclick="openOuvirModal('${s.id}')" title="Ouvir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
          Ouvir${(s.streamLinks||[]).length ? ` (${s.streamLinks.length})` : ''}
        </button>
        <button class="cifra-link" onclick="openVozesModal('${s.id}')" title="Vozes">

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">${iconPath}</svg>
    <p class="empty-title">${title}</p>

  wrap.innerHTML = `<div class="repeater">${links.map((l,i)=>`
    <div class="repeater-row">
      <span style="font-size:12px;color:var(--muted);min-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(l.label||'Link')}</span>

    </div>`).join('')}</div>`;
}
function songStreamAdd(){
  const label = document.getElementById('f_streamLabel').value.trim();
  const url = document.getElementById('f_streamUrl').value.trim();

  window._streamLinksDraft.push({id:uid(), label:label||url, url});
  document.getElementById('f_streamLabel').value='';
  document.getElementById('f_streamUrl').value='';

}
function songStreamRemove(i){
  window._streamLinksDraft.splice(i,1);
  renderSongStreamLinks();
}

    </div>

        <label style="display:flex; align-items:center; gap:6px; font-size:13.5px;"><input type="radio" name="f_cat" value="hino" ${cat==='hino'?'checked':''}> Hino</label>

    </div>
    <div class="field"><label>Link da cifra (PDF, imagem ou Drive)</label><input class="input" id="f_link" value="${escapeHtml(song?.chordLink||'')}" placeholder="https://..."></div>

      <label>Links para ouvir (YouTube, Spotify, Deezer…)</label>

  `);

function renderTagCheckboxes(selectedTags){
  if(state.tagDefs.length === 0){
    return `<p class="hint">Nenhuma tag cadastrada ainda. Use "Gerencie as tags" pra criar a primeira.</p>`;
  }
  return state.tagDefs.map(t=>`
    <label class="tag-check">
      <input type="checkbox" value="${t.id}" ${selectedTags.has(t.id)?'checked':''}>
      <span class="dot" style="background:${t.color};"></span>
      ${escapeHtml(t.name)}
    </label>
  `).join('');
}

async function saveSong(id){
  const title = document.getElementById('f_title').value.trim();
  if(!title){ document.getElementById('songError').style.display='block'; return; }
  const category = document.querySelector('input[name="f_cat"]:checked')?.value || 'musica';
  const artist = document.getElementById('f_artist').value.trim();
  const tom = document.getElementById('f_tom').value.trim();
  const tags = [...document.querySelectorAll('#f_tagsWrap input[type="checkbox"]:checked')].map(i=>i.value);
  const chordLink = document.getElementById('f_link').value.trim();
  const streamLinks = window._streamLinksDraft || [];

  if(id){
    const s = state.songs.find(s=>s.id===id);
    Object.assign(s, {title, artist, tom, tags, chordLink, category, streamLinks});
  } else {
    state.songs.push({id:uid(), title, artist, tom, tags, chordLink, category, streamLinks});
  }
  await saveKey('songs__v1', state.songs);
  closeModal();
  state.catFilter = category;
  document.querySelectorAll('.cat-toggle-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===category));
  renderCatalog();
  showToast('Música salva.');
}

/* ================= GERENCIADOR DE TAGS ================= */
function openTagManager(){
  window._newTagColor = TAG_COLORS[0];
  openModal(`
    <div class="modal-head">
      <h3>Gerenciar tags</h3>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="tagListWrap"></div>
    <div class="field" style="margin-top:14px;">
      <label>Nova tag</label>
      <div style="display:flex; gap:8px;">
        <input class="input" id="newTagName" placeholder="Ex: Adoração" style="flex:1;">
        <button class="btn btn-sm btn-dark" onclick="addTagDef()">Adicionar</button>
      </div>
      <div class="color-swatches" id="newTagColors"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-dark" style="flex:1;" onclick="closeModal()">Concluído</button>
    </div>
  `);
  renderTagManagerList();
  renderColorSwatches();
}
function renderColorSwatches(){
  document.getElementById('newTagColors').innerHTML = TAG_COLORS.map(c=>
    `<button type="button" class="color-swatch ${c===window._newTagColor?'selected':''}" style="background:${c};" onclick="pickNewTagColor('${c}')"></button>`
  ).join('');
}
function pickNewTagColor(c){
  window._newTagColor = c;
  renderColorSwatches();
}
function renderTagManagerList(){
  const wrap = document.getElementById('tagListWrap');
  if(state.tagDefs.length === 0){
    wrap.innerHTML = `<p class="hint">Nenhuma tag cadastrada ainda.</p>`;
    return;
  }
  wrap.innerHTML = state.tagDefs.map(t=>`
    <div class="tag-row">
      <span class="dot" style="background:${t.color};"></span>
      <span style="flex:1; font-size:13.5px;">${escapeHtml(t.name)}</span>
      <button class="icon-btn" onclick="deleteTagDef('${t.id}')" aria-label="Remover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
  `).join('');
}
async function addTagDef(){
  const input = document.getElementById('newTagName');
  const name = input.value.trim();
  if(!name) return;
  state.tagDefs.push({id:uid(), name, color: window._newTagColor || TAG_COLORS[0]});
  await saveKey('tagDefs__v1', state.tagDefs);
  input.value = '';
  renderTagManagerList();
}
async function deleteTagDef(id){
  if(!confirm('Remover esta tag? Ela será retirada de todas as músicas que a usam.')) return;
  state.tagDefs = state.tagDefs.filter(t=>t.id!==id);
  state.songs.forEach(s=>{ if(s.tags) s.tags = s.tags.filter(tid=>tid!==id); });
  await saveKey('tagDefs__v1', state.tagDefs);
  await saveKey('songs__v1', state.songs);
  renderTagManagerList();
  renderCatalog();
}

async function deleteSong(id){
  if(!confirm('Remover esta música do catálogo?')) return;
  state.songs = state.songs.filter(s=>s.id!==id);
  await saveKey('songs__v1', state.songs);
  renderCatalog();
  showToast('Música removida.');
}

document.getElementById('searchInput').addEventListener('input', renderCatalog);
document.getElementById('filterTom').addEventListener('change', renderCatalog);

/* ================= MURAL ================= */
function muralSetlistHtml(m, isPast){
  const items = [...m.items].sort((a,b)=>a.order-b.order);
  return `
    <div class="setlist-card" style="${isPast?'opacity:0.8;':''}" >
      <div class="setlist-header" style="${isPast?'background:var(--ink-soft);':''}" >
        <p class="eyebrow">Repertório de</p>
        <h3>${fmtDateLong(m.date)}</h3>
      </div>
      <div class="setlist-divider"></div>
      <div class="setlist-body">
        ${items.map((it,i)=>{
          const song = state.songs.find(s=>s.id===it.songId);
          if(!song) return '';
          return `<div class="setlist-item">
            <span class="setlist-num">${String(i+1).padStart(2,'0')}</span>
            <div class="setlist-info">
              ${it.moment?`<p class="setlist-moment">${escapeHtml(it.moment)}</p>`:''}
              <p class="setlist-song">${escapeHtml(song.title)}</p>
              ${song.artist?`<p class="setlist-artist">${escapeHtml(song.artist)}</p>`:''}
            </div>
            <span class="setlist-stamp">${escapeHtml(song.tom||'—')}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderMural(){
  const wrap = document.getElementById('muralWrap');
  const today = new Date().toISOString().slice(0,10);
  const current = state.murals.filter(m=>m.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
  const past = state.murals.filter(m=>m.date < today).sort((a,b)=>b.date.localeCompare(a.date));

  if(state.murals.length===0){
    wrap.innerHTML = emptyState(
      '<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>',
      'O mural ainda não foi montado',
      state.isAdmin ? 'Clique em "Editar mural" para escolher as músicas do próximo culto.' : 'Em breve o líder de louvor vai escolher as músicas do próximo domingo.'
    );
    return;
  }

  let html = '';
  if(current.length === 0){
    html += emptyState('<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>', 'Nenhum culto futuro no mural', state.isAdmin ? 'Crie um novo mural para o próximo culto.' : 'Aguarde o líder publicar o próximo mural.');
  } else {
    html += current.map(m=>muralSetlistHtml(m,false)).join('');
  }

  if(past.length > 0){
    html += `
      <details style="margin-top:18px;">
        <summary style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);user-select:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><path d="M6 9l6 6 6-6"/></svg>
          Cultos anteriores (${past.length})
        </summary>
        <div style="margin-top:10px;">
          ${past.map(m=>muralSetlistHtml(m,true)).join('')}
        </div>
      </details>`;
  }
  wrap.innerHTML = html;
}

function openMuralModal(){
  if(state.songs.length===0){
    openModal(`
      <div class="modal-head"><h3>Novo mural</h3><button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <p style="font-size:13.5px;color:var(--muted)">Adicione músicas ao catálogo primeiro, antes de montar o mural.</p>
      <div class="modal-actions"><button class="btn btn-dark" onclick="closeModal()">Entendi</button></div>
    `);
    return;
  }
  const today = new Date().toISOString().slice(0,10);
  const existing = state.murals.filter(m=>m.date>=today).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const date = existing?.date || nextSundayISO();
  const items = existing?.items ? [...existing.items].sort((a,b)=>a.order-b.order) : [];
  window._muralDraft = JSON.parse(JSON.stringify(items));
  window._muralEditId = existing?.id || null;
  openModal(`
    <div class="modal-head">
      <h3>Editar mural</h3>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="field"><label>Data do culto</label><input class="input" type="date" id="m_date" value="${date}"></div>
    <div class="field"><label>Adicionar música</label>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <select class="input" id="m_songSelect" style="flex:2; min-width:140px;">
          ${state.songs.slice().sort((a,b)=>a.title.localeCompare(b.title,'pt-BR')).map(s=>`<option value="${s.id}">${escapeHtml(s.title)}</option>`).join('')}
        </select>
        <input class="input" id="m_moment" placeholder="Momento (ex: Abertura)" style="flex:1; min-width:120px;">
        <button class="btn btn-sm" onclick="muralAddItem()">+</button>
      </div>
    </div>
    <div id="m_itemsWrap"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-dark" onclick="saveMural()">Salvar mural</button>
    </div>
  `);
  renderMuralDraftItems();
}

function renderMuralDraftItems(){
  const wrap = document.getElementById('m_itemsWrap');
  const items = window._muralDraft;
  if(items.length===0){
    wrap.innerHTML = `<p class="hint" style="margin-bottom:10px;">Nenhuma música adicionada ainda.</p>`;
    return;
  }
  wrap.innerHTML = `<div class="repeater">${items.map((it,i)=>{
    const song = state.songs.find(s=>s.id===it.songId);
    return `<div class="repeater-row">
      <span class="mono" style="font-size:12px;color:var(--muted);width:18px;">${i+1}</span>
      <span style="flex:1;font-size:13px;">${escapeHtml(song?.title||'?')}${it.moment?` <span style="color:var(--muted)">— ${escapeHtml(it.moment)}</span>`:''}</span>
      <button class="icon-btn" onclick="muralMove(${i},-1)" aria-label="Subir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
      <button class="icon-btn" onclick="muralMove(${i},1)" aria-label="Descer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>
      <button class="icon-btn" onclick="muralRemove(${i})" aria-label="Remover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>`;
  }).join('')}</div>`;
}
function muralAddItem(){
  const songId = document.getElementById('m_songSelect').value;
  const moment = document.getElementById('m_moment').value.trim();
  window._muralDraft.push({songId, moment, order: window._muralDraft.length});
  document.getElementById('m_moment').value='';
  renderMuralDraftItems();
}
function muralMove(i, dir){
  const arr = window._muralDraft;
  const j = i+dir;
  if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  renderMuralDraftItems();
}
function muralRemove(i){
  window._muralDraft.splice(i,1);
  renderMuralDraftItems();
}
async function saveMural(){
  const date = document.getElementById('m_date').value;
  const items = window._muralDraft.map((it,i)=>({...it,order:i}));
  if(window._muralEditId){
    const m = state.murals.find(m=>m.id===window._muralEditId);
    if(m){ m.date=date; m.items=items; }
    else  { state.murals.push({id:uid(),date,items}); }
  } else {
    const existing = state.murals.find(m=>m.date===date);
    if(existing){ existing.items=items; }
    else         { state.murals.push({id:uid(),date,items}); }
  }
  await saveKey('murals__v1', state.murals);
  closeModal();
  renderMural();
  showToast('Mural salvo.');
}

function renderAgenda(){
  const wrap = document.getElementById('agendaWrap');
  const today = new Date().toISOString().slice(0,10);
  const events = state.agenda.filter(e=>e.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
  const past = state.agenda.filter(e=>e.date < today).sort((a,b)=>b.date.localeCompare(a.date));

  if(state.agenda.length===0){
    wrap.innerHTML = emptyState(
      '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/>',
      'Nenhuma data na agenda',
      state.isAdmin ? 'Clique em "Nova data" para criar a primeira escala.' : 'O líder ainda não publicou as próximas escalas.'
    );
    return;
  }

  let html = '';
  if(events.length === 0){
    html += emptyState('<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/>', 'Sem datas futuras', 'Todas as datas cadastradas já passaram.');
  } else {
    html += events.map(e=>agendaCardHtml(e)).join('');
  }

  if(past.length > 0){
    html += `
      <details style="margin-top:18px;">
        <summary style="cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; padding:10px 0; border-top:1px solid var(--line); font-size:13px; font-weight:600; color:var(--muted); user-select:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;transition:transform 0.2s;" class="past-chevron"><path d="M6 9l6 6 6-6"/></svg>
          Datas passadas (${past.length})
        </summary>
        <div style="margin-top:10px; opacity:0.75;">
          ${past.map(e=>agendaCardHtml(e)).join('')}
        </div>
      </details>`;
  }

  wrap.innerHTML = html;
}

function agendaCardHtml(e){
  return `<div class="agenda-card">
    <div class="agenda-top">

        <p class="agenda-date">${fmtDateLong(e.date)}</p>

      </div>
      ${state.isAdmin ? `
        <div style="display:flex;gap:6px;">

          <button class="icon-btn" onclick="deleteEvent('${e.id}')" aria-label="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>
        </div>` : ''}
    </div>
    ${e.desc ? `<p class="agenda-desc">${escapeHtml(e.desc)}</p>`:''}
    <div class="team-grid">
      ${(e.team||[]).map(m=>`<div class="team-chip"><span class="team-avatar">${escapeHtml(initials(m.name))}</span>${escapeHtml(m.name)} <span class="team-role">${escapeHtml(m.role||'')}</span></div>`).join('') || '<span class="hint">Escala ainda não definida.</span>'}
    </div>
  </div>`;
}

function openEventModal(id){
  const ev = id ? state.agenda.find(e=>e.id===id) : null;
  window._teamDraft = ev ? JSON.parse(JSON.stringify(ev.team||[])) : [];
  openModal(`
    <div class="modal-head">
      <h3>${ev ? 'Editar data' : 'Nova data'}</h3>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="field-row">
      <div class="field"><label>Data *</label><input class="input" type="date" id="e_date" value="${ev?.date||nextSundayISO()}"></div>
      <div class="field" style="max-width:120px;"><label>Horário</label><input class="input" type="time" id="e_time" value="${escapeHtml(ev?.time||'')}"></div>
    </div>
    <div class="field"><label>Observação</label><input class="input" id="e_desc" value="${escapeHtml(ev?.desc||'')}" placeholder="Ex: Culto de domingo, Ensaio geral..."></div>
    <datalist id="dl_names">${state.knownNames.map(n=>`<option value="${escapeHtml(n)}">`).join('')}</datalist>
    <datalist id="dl_roles">${state.knownRoles.map(r=>`<option value="${escapeHtml(r)}">`).join('')}</datalist>
    <div class="field"><label>Escala</label>
      <div style="display:flex; gap:8px;">
        <input class="input" id="t_name" placeholder="Nome" list="dl_names" style="flex:1;">
        <input class="input" id="t_role" placeholder="Função (ex: vocal)" list="dl_roles" style="flex:1;">
        <button class="btn btn-sm" onclick="teamAdd()">+</button>
      </div>
    </div>
    <div id="t_wrap"></div>
    <p class="error-msg" id="eventError" style="display:none;">Escolha uma data.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-dark" onclick="saveEvent(${ev?`'${ev.id}'`:'null'})">Salvar</button>
    </div>
  `);
  renderTeamDraft();
}
function renderTeamDraft(){
  const wrap = document.getElementById('t_wrap');
  const team = window._teamDraft;
  if(team.length===0){ wrap.innerHTML = `<p class="hint" style="margin-bottom:10px;">Ninguém na escala ainda.</p>`; return; }
  wrap.innerHTML = `<div class="repeater">${team.map((m,i)=>`
    <div class="repeater-row">
      <span class="team-avatar">${escapeHtml(initials(m.name))}</span>
      <span style="flex:1;font-size:13px;">${escapeHtml(m.name)} <span style="color:var(--muted)">— ${escapeHtml(m.role||'')}</span></span>
      <button class="icon-btn" onclick="teamRemove(${i})" aria-label="Remover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>`).join('')}</div>`;
}
async function teamAdd(){
  const name = document.getElementById('t_name').value.trim();
  const role = document.getElementById('t_role').value.trim();
  if(!name) return;
  window._teamDraft.push({name, role});
  document.getElementById('t_name').value='';
  document.getElementById('t_role').value='';
  renderTeamDraft();
  let changed = false;
  if(!state.knownNames.includes(name)){ state.knownNames.push(name); changed=true; }
  if(role && !state.knownRoles.includes(role)){ state.knownRoles.push(role); changed=true; }
  if(changed) await saveKey('teamKnown__v1', {names:state.knownNames, roles:state.knownRoles});
}
function teamRemove(i){ window._teamDraft.splice(i,1); renderTeamDraft(); }

async function saveEvent(id){
  const date = document.getElementById('e_date').value;
  if(!date){ document.getElementById('eventError').style.display='block'; return; }
  const time = document.getElementById('e_time').value.trim();
  const desc = document.getElementById('e_desc').value.trim();
  const team = window._teamDraft;
  if(id){
    const e = state.agenda.find(e=>e.id===id);
    Object.assign(e, {date, time, desc, team});
  } else {
    state.agenda.push({id:uid(), date, time, desc, team});
  }
  await saveKey('agenda__v1', state.agenda);
  closeModal();
  renderAgenda();
  showToast('Agenda atualizada.');
}
async function deleteEvent(id){
  if(!confirm('Remover esta data da agenda?')) return;
  state.agenda = state.agenda.filter(e=>e.id!==id);
  await saveKey('agenda__v1', state.agenda);
  renderAgenda();
  showToast('Data removida.');
}

/* ================= OUVIR ================= */

  if(l.includes('deezer')) return `<svg viewBox="0 0 24 24" fill="currentColor" style="color:#FF0092;width:18px;height:18px;"><path d="M18.19 14.4H24v1.5h-5.81zm0-3.6H24v1.5h-5.81zm0-3.6H24V8.7h-5.81zM0 17.4h5.81v1.5H0zm6.1 0h5.81v1.5H6.1zm6.09 0H18v1.5h-5.81zM6.1 13.8h5.81v1.5H6.1zm6.09 0H18v1.5h-5.81zm0-3.6H18v1.5h-5.81z"/></svg>`;
  if(l.includes('youtube')) return `<svg viewBox="0 0 24 24" fill="currentColor" style="color:#FF0000;width:18px;height:18px;"><path d="M23.5 6.2a3.01 3.01 0 0 0-2.12-2.13C19.54 3.6 12 3.6 12 3.6s-7.54 0-9.38.5A3.01 3.01 0 0 0 .5 6.2 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.8 3.01 3.01 0 0 0 2.12 2.12c1.84.5 9.38.5 9.38.5s7.54 0 9.38-.5a3.01 3.01 0 0 0 2.12-2.12A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.8zM9.6 15.6V8.4l6.27 3.6-6.27 3.6z"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>`;
}

function openOuvirModal(songId){
  const song = state.songs.find(s=>s.id===songId);
  if(!song) return;
  const links = song.streamLinks || [];
  openModal(`
    <div class="modal-head">
      <h3>Ouvir — ${escapeHtml(song.title)}</h3>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    ${links.length === 0
      ? `<p style="font-size:13.5px;color:var(--muted);padding:12px 0;">Nenhum link adicionado ainda.${state.isAdmin ? ' Edite a música para adicionar links.' : ''}</p>`
      : links.map(l=>`
          <a class="ouv-link-btn" href="${escapeHtml(l.url)}" target="_blank" rel="noopener">
            ${platformIcon(l.label, l.url)}

          </a>`).join('')}

    </div>

/* ================= APOIO ================= */
const APOIO_TIPOS = ['Áudio','PDF','Texto','Outro'];

function openApoioModal(songId){
  const song = state.songs.find(s=>s.id===songId);
  if(!song) return;
  openModal(`
    <div class="modal-head">
      <h3>Apoio — ${escapeHtml(song.title)}</h3>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="apoioListWrap"></div>
    ${state.isAdmin ? `
    <div class="voz-add-section">
      <p style="font-size:12px; font-weight:600; color:var(--ink-soft); margin:0 0 10px;">Adicionar material</p>
      <div class="field-row">
        <div class="field">
          <label>Tipo</label>
          <select class="input" id="apoio_tipo" style="width:100%;" onchange="apoioTipoChanged()">
            ${APOIO_TIPOS.map(t=>`<option value="${t}">${t}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="flex:2;">
          <label>Nome / descrição</label>
          <input class="input" id="apoio_nome" placeholder="Ex: Violão — arranjo da equipe" style="width:100%;">
        </div>
      </div>
      <div id="apoio_inputWrap">
        <div class="field">
          <label>Arquivo (áudio ou PDF)</label>
          <label class="voz-file-label" for="apoio_fileInput">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            <span id="apoio_fileLabel">Selecionar arquivo…</span>
          </label>
          <input type="file" id="apoio_fileInput" accept="audio/*,application/pdf" onchange="apoioFileSelected(this)">
        </div>
      </div>
      <p class="error-msg" id="apoioError" style="display:none;">Adicione um arquivo ou texto.</p>
      <div class="modal-actions" style="margin-top:10px;">
        <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
        <button class="btn btn-dark" onclick="addApoio('${songId}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M12 5v14M5 12h14"/></svg>
          Salvar material
        </button>
      </div>
    </div>` : `
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-dark" onclick="closeModal()">Fechar</button>
    </div>`}
  `);
  renderApoioList(songId);
}

function apoioTipoChanged(){
  const tipo = document.getElementById('apoio_tipo').value;
  const wrap = document.getElementById('apoio_inputWrap');
  if(tipo === 'Texto'){
    wrap.innerHTML = `<div class="field"><label>Texto</label><textarea class="input" id="apoio_texto" rows="4" placeholder="Cole ou escreva o texto de apoio aqui…" style="width:100%;"></textarea></div>`;
  } else {
    const accept = tipo === 'PDF' ? 'application/pdf' : tipo === 'Áudio' ? 'audio/*' : '*/*';
    wrap.innerHTML = `<div class="field">
      <label>Arquivo</label>
      <label class="voz-file-label" for="apoio_fileInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span id="apoio_fileLabel">Selecionar arquivo…</span>
      </label>
      <input type="file" id="apoio_fileInput" accept="${accept}" onchange="apoioFileSelected(this)">
    </div>`;
  }
}

function apoioFileSelected(input){
  const label = document.getElementById('apoio_fileLabel');
  if(label && input.files && input.files[0]) label.textContent = input.files[0].name;
}

function renderApoioList(songId){
  const wrap = document.getElementById('apoioListWrap');
  if(!wrap) return;
  const items = state.apoio[songId] || [];
  if(items.length === 0){
    wrap.innerHTML = `<p class="voz-empty">Nenhum material adicionado ainda.</p>`;
    return;
  }
  wrap.innerHTML = `<div style="margin-bottom:6px;">${items.map(item=>`
    <div class="apoio-row">
      <span class="apoio-type-badge">${escapeHtml(item.tipo)}</span>
      <div class="apoio-info">
        <p class="apoio-nome">${escapeHtml(item.nome||item.tipo)}</p>
        ${item.tipo==='Texto'
          ? `<div class="apoio-texto-body">${escapeHtml(item.texto||'')}</div>`
          : item.dataUrl
            ? item.tipo==='Áudio' || item.dataUrl.startsWith('data:audio')
              ? `<audio controls src="${item.dataUrl}" style="width:100%;height:36px;margin-top:4px;"></audio>`
              : `<a href="${item.dataUrl}" download="${escapeHtml(item.nome||'arquivo')}" class="cifra-link" style="display:inline-flex;margin-top:4px;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                  Baixar arquivo
                </a>`
            : ''}
      </div>
      ${state.isAdmin ? `<button class="icon-btn" onclick="deleteApoio('${songId}','${item.id}')" aria-label="Remover" style="flex:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
      </button>` : ''}
    </div>`).join('')}</div>`;
}

async function addApoio(songId){
  const tipo = document.getElementById('apoio_tipo').value;
  const nome = (document.getElementById('apoio_nome')?.value||'').trim();
  const errEl = document.getElementById('apoioError');
  errEl.style.display='none';

  let item = {id:uid(), tipo, nome};

  if(tipo === 'Texto'){
    const texto = (document.getElementById('apoio_texto')?.value||'').trim();
    if(!texto){ errEl.style.display='block'; return; }
    item.texto = texto;
  } else {
    const fileInput = document.getElementById('apoio_fileInput');
    if(!fileInput?.files?.[0]){ errEl.style.display='block'; return; }
    item.dataUrl = await new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = e => resolve(e.target.result);
      r.onerror = reject;
      r.readAsDataURL(fileInput.files[0]);
    });
  }

  if(!state.apoio[songId]) state.apoio[songId] = [];
  state.apoio[songId].push(item);
  await saveKey('apoio__v1', state.apoio);
  renderApoioList(songId);
  renderCatalog();
  document.getElementById('apoio_nome').value='';
  const fileInput = document.getElementById('apoio_fileInput');
  if(fileInput) fileInput.value='';
  const lbl = document.getElementById('apoio_fileLabel');
  if(lbl) lbl.textContent='Selecionar arquivo…';
  showToast('Material adicionado.');
}

async function deleteApoio(songId, itemId){
  if(!confirm('Remover este material de apoio?')) return;
  state.apoio[songId] = (state.apoio[songId]||[]).filter(i=>i.id!==itemId);
  await saveKey('apoio__v1', state.apoio);
  renderApoioList(songId);
  renderCatalog();
  showToast('Material removido.');
}

/* ================= VOZES ================= */
const VOZ_TIPOS = ['Melodia','Tenor','Contralto','Soprano'];

function openVozesModal(songId){
  const song = state.songs.find(s=>s.id===songId);
  if(!song) return;
  openModal(`
    <div class="modal-head">
      <h3>Vozes — ${escapeHtml(song.title)}</h3>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="vozListWrap"></div>
    ${state.isAdmin ? `
    <div class="voz-add-section">
      <p style="font-size:12px; font-weight:600; color:var(--ink-soft); margin:0 0 10px;">Adicionar voz</p>
      <div class="field">
        <label>Tipo de voz</label>
        <select class="input" id="voz_tipo" style="width:100%;">
          ${VOZ_TIPOS.map(t=>`<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Nome / identificação (opcional)</label>
        <input class="input" id="voz_nome" placeholder="Ex: João — ensaio 12/06" style="width:100%;">
      </div>
      <div class="field">
        <label>Áudio</label>
        <label class="voz-file-label" for="voz_fileInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          <span id="voz_fileLabel">Selecionar arquivo de áudio…</span>
        </label>
        <input type="file" id="voz_fileInput" accept="audio/*" onchange="vozFileSelected(this)">
      </div>
      <p class="error-msg" id="vozError" style="display:none;">Selecione um arquivo de áudio.</p>
      <div class="modal-actions" style="margin-top:10px;">
        <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
        <button class="btn btn-dark" onclick="addVoz('${songId}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M12 5v14M5 12h14"/></svg>
          Salvar voz
        </button>
      </div>
    </div>` : `
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-dark" onclick="closeModal()">Fechar</button>
    </div>`}
  `);
  renderVozesList(songId);
}

function renderVozesList(songId){
  const wrap = document.getElementById('vozListWrap');
  if(!wrap) return;
  const vozes = state.voices[songId] || [];
  if(vozes.length === 0){
    wrap.innerHTML = `<p class="voz-empty">Nenhuma voz adicionada ainda.</p>`;
    return;
  }
  wrap.innerHTML = `<div style="margin-bottom:6px;">${vozes.map((v,i)=>`
    <div class="voz-row">
      <div style="display:flex;flex-direction:column;gap:2px;flex:none;">
        <span class="voz-type-badge">${escapeHtml(v.tipo)}</span>
        ${v.nome ? `<span style="font-size:10.5px;color:var(--muted);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(v.nome)}">${escapeHtml(v.nome)}</span>` : ''}
      </div>
      <audio class="voz-audio" controls src="${v.dataUrl}"></audio>
      ${state.isAdmin ? `<button class="icon-btn" onclick="deleteVoz('${songId}','${v.id}')" aria-label="Remover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
      </button>` : ''}
    </div>`).join('')}</div>`;
}

function vozFileSelected(input){
  const label = document.getElementById('voz_fileLabel');
  if(input.files && input.files[0]){
    label.textContent = input.files[0].name;
  } else {
    label.textContent = 'Selecionar arquivo de áudio…';
  }
}

async function addVoz(songId){
  const fileInput = document.getElementById('voz_fileInput');
  const tipo = document.getElementById('voz_tipo').value;
  const errEl = document.getElementById('vozError');
  if(!fileInput.files || !fileInput.files[0]){
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  const file = fileInput.files[0];
  const nome = (document.getElementById('voz_nome').value||'').trim();
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  if(!state.voices[songId]) state.voices[songId] = [];
  state.voices[songId].push({id: uid(), tipo, nome, dataUrl});
  await saveKey('voices__v1', state.voices);
  renderVozesList(songId);
  renderCatalog();
  fileInput.value = '';
  document.getElementById('voz_fileLabel').textContent = 'Selecionar arquivo de áudio…';
  document.getElementById('voz_nome').value = '';
  showToast('Voz adicionada.');
}

async function deleteVoz(songId, voiceId){
  if(!confirm('Remover esta gravação de voz?')) return;
  state.voices[songId] = (state.voices[songId]||[]).filter(v=>v.id!==voiceId);
  await saveKey('voices__v1', state.voices);
  renderVozesList(songId);
  renderCatalog();
  showToast('Voz removida.');
}

/* ================= INIT ================= */
async function init(){
  renderTabs();
  switchTab('catalogo');
  state.songs = await loadKey('songs__v1', []);
  // migração: se existir mural antigo (objeto único), converte para array
  const oldMural = await loadKey('mural__v1', null);
  const newMurals = await loadKey('murals__v1', null);
  if(newMurals){ state.murals = newMurals; }
  else if(oldMural && oldMural.date){ state.murals = [{id:uid(), date:oldMural.date, items:oldMural.items||[]}]; await saveKey('murals__v1', state.murals); }
  else { state.murals = []; }
  state.agenda = await loadKey('agenda__v1', []);
  state.tagDefs = await loadKey('tagDefs__v1', []);
  state.voices = await loadKey('voices__v1', {});
  state.apoio = await loadKey('apoio__v1', {});
  const teamKnown = await loadKey('teamKnown__v1', {names:[],roles:[]});
  state.knownNames = teamKnown.names||[];
  state.knownRoles = teamKnown.roles||[];
  await importDriveBatch(true);
  renderAdminUI();
  renderCatalog();
  renderMural();
  renderAgenda();
}
init();
</script>
